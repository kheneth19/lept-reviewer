<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEPT 2026 Board Exam Reviewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --tertiary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --accent-color: #00f2fe;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --dark-bg: #0f172a;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --border-radius: 1rem;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            background-attachment: fixed;
            background-image: 
                radial-gradient(at 20% 50%, rgba(102, 126, 234, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(245, 93, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 40% 20%, rgba(79, 172, 254, 0.1) 0px, transparent 50%);
            background-color: var(--dark-bg);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-md);
        }

        /* Header & Title */
        header {
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-md);
            margin-bottom: var(--spacing-xl);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-sm);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Tab Navigation */
        .tab-container {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: var(--spacing-sm);
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .tab-btn {
            flex: 1;
            min-width: 150px;
            padding: var(--spacing-md) var(--spacing-lg);
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--secondary-gradient);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 93, 248, 0.2);
        }

        .tab-btn:hover::before {
            left: 0;
        }

        .tab-btn.active {
            background: var(--secondary-gradient);
            color: var(--text-primary);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(245, 93, 248, 0.3);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        /* Questions Grid */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        /* Question Card (Accordion) */
        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            animation: cardSlide 0.6s ease-out backwards;
        }

        @keyframes cardSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: var(--card-shadow);
        }

        .question-header {
            padding: var(--spacing-md);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--spacing-md);
        }

        .question-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--tertiary-gradient);
            border-radius: 50%;
            flex-shrink: 0;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .question-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .expand-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-card.expanded .expand-icon {
            transform: rotate(180deg);
            color: var(--accent-color);
        }

        /* Answer Section */
        .answer-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 242, 254, 0.05);
            border-top: 1px solid var(--glass-border);
        }

        .question-card.expanded .answer-section {
            max-height: 1000px;
        }

        .answer-content {
            padding: var(--spacing-md);
        }

        .answer-item {
            margin-bottom: var(--spacing-md);
        }

        .answer-item:last-child {
            margin-bottom: 0;
        }

        .answer-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .answer-label::before {
            content: '✓';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: var(--success-color);
            border-radius: 50%;
            font-size: 0.75rem;
            color: var(--text-primary);
        }

        .answer-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            padding: var(--spacing-sm);
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-color);
            border-radius: 0.5rem;
        }

        .rationale-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--warning-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            margin-top: var(--spacing-md);
        }

        .rationale-label::before {
            content: '💡';
            display: inline-flex;
            font-size: 1rem;
        }

        .rationale-text {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text-secondary);
            padding: var(--spacing-sm);
            background: rgba(245, 158, 11, 0.05);
            border-left: 3px solid var(--warning-color);
            border-radius: 0.5rem;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-lg);
            justify-content: center;
        }

        .stat-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 0.8rem;
            padding: var(--spacing-md) var(--spacing-lg);
            min-width: 150px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-xs);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: var(--spacing-lg) var(--spacing-md);
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: var(--spacing-xl);
            border-top: 1px solid var(--glass-border);
        }

        .footer-gradient {
            background: var(--tertiary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container { padding: var(--spacing-sm); }
            header { padding: var(--spacing-lg) var(--spacing-md); margin-bottom: var(--spacing-lg); }
            h1 { font-size: 1.8rem; }
            .tab-container { flex-direction: column; gap: var(--spacing-sm); }
            .tab-btn { min-width: 100%; padding: var(--spacing-md); }
            .questions-grid { grid-template-columns: 1fr; gap: var(--spacing-md); }
            .question-header { padding: var(--spacing-md); }
            .question-text { font-size: 0.9rem; }
            .stats-bar { gap: var(--spacing-sm); }
            .stat-item { flex: 1; min-width: 120px; padding: var(--spacing-md); }
            .stat-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📚 LEPT 2026 Board Exam Reviewer</h1>
            <p class="subtitle">Master the LET curriculum with high-yield questions and detailed explanations</p>
        </header>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalQuestions">0</div>
                <div class="stat-label">Total Questions</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="currentTab">General Ed</div>
                <div class="stat-label">Current Section</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">Reviewed</div>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-container">
            <button class="tab-btn active" data-tab="general-education">General Education</button>
            <button class="tab-btn" data-tab="professional-education">Professional Education</button>
        </div>

        <!-- General Education Tab -->
        <div id="general-education" class="tab-content active">
            <div class="questions-grid" id="general-questions"></div>
        </div>

        <!-- Professional Education Tab -->
        <div id="professional-education" class="tab-content">
            <div class="questions-grid" id="professional-questions"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>✨ <span class="footer-gradient">Works Offline • No Internet Required • Study Anywhere</span> ✨</p>
        <p style="margin-top: var(--spacing-md); font-size: 0.8rem;">Designed for LET 2026 Preparation • Last Updated: July 2026</p>
    </footer>

    <script>
        // QUESTION DATABASE
        const questionDatabase = {
            'general-education': [
                {
                    id: 1,
                    question: 'Which of the following is the primary purpose of formative assessment?',
                    answer: 'To provide feedback during instruction for learning improvement',
                    rationale: 'Formative assessment occurs during the learning process and helps identify student understanding and misconceptions in real-time. This allows teachers to adjust instruction and provide corrective feedback to improve student learning before summative evaluation.'
                },
                {
                    id: 2,
                    question: 'Bloom\'s Taxonomy was revised in 2001 to replace "Evaluation" with which term?',
                    answer: 'Create',
                    rationale: 'Anderson and Krathwohl revised Bloom\'s Taxonomy in 2001, changing the highest level from "Evaluation" to "Create." This better reflects the cognitive processes in the 21st century and emphasizes the importance of creative thinking and synthesis.'
                },
                {
                    id: 3,
                    question: 'In Jean Piaget\'s theory, what is the cognitive characteristic of the preoperational stage (2-7 years)?',
                    answer: 'Egocentrism and magical thinking',
                    rationale: 'During the preoperational stage, children exhibit egocentrism (inability to see others\' perspectives), centration (focusing on one aspect), and magical thinking. They lack conservation and cannot understand reversibility of operations.'
                },
                {
                    id: 4,
                    question: 'Which learning theory emphasizes that behavior is shaped by consequences?',
                    answer: 'Operant Conditioning (B.F. Skinner)',
                    rationale: 'B.F. Skinner\'s operant conditioning theory states that behavior is controlled by its consequences. Positive reinforcement, negative reinforcement, and punishment modify behavior through consequences, forming the basis for behavior modification techniques.'
                },
                {
                    id: 5,
                    question: 'What does "scaffolding" mean in the context of Vygotsky\'s Zone of Proximal Development (ZPD)?',
                    answer: 'Temporary support given to a learner to master a task.',
                    rationale: 'Scaffolding is the temporary assistance provided by a More Knowledgeable Other (MKO) to a student, which is gradually removed as the learner becomes independent.'
                }
            ],
            'professional-education': [
                {
                    id: 1,
                    question: 'According to the Code of Ethics for Professional Teachers, what is the teacher’s primary duty to the state?',
                    answer: 'To transmit the state’s cultural and national heritage and foster patriotism.',
                    rationale: 'Teachers are trustees of the state and are mandated to instill love of country, civic duties, and national pride in their students.'
                },
                {
                    id: 2,
                    question: 'Which curriculum model focuses heavily on student interests, collaboration, and real-world problem-solving?',
                    answer: 'Learner-Centered Curriculum',
                    rationale: 'Learner-centered curriculum designs prioritize the needs, capabilities, and interests of the students, making learning more contextualized and collaborative.'
                }
            ]
        };

        const reviewedQuestions = new Set();

        function renderQuestions() {
            const genEdContainer = document.getElementById('general-questions');
            const profEdContainer = document.getElementById('professional-questions');
            
            genEdContainer.innerHTML = '';
            profEdContainer.innerHTML = '';

            // Render Gen Ed
            questionDatabase['general-education'].forEach(q => {
                genEdContainer.appendChild(createCard(q, 'general-education'));
            });

            // Render Prof Ed
            questionDatabase['professional-education'].forEach(q => {
                profEdContainer.appendChild(createCard(q, 'professional-education'));
            });

            updateStats('general-education');
        }

        function createCard(q, category) {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="question-header">
                    <span class="question-number">${q.id}</span>
                    <span class="question-text">${q.question}</span>
                    <span class="expand-icon">▼</span>
                </div>
                <div class="answer-section">
                    <div class="answer-content">
                        <div class="answer-item">
                            <div class="answer-label">Correct Answer</div>
                            <div class="answer-text">${q.answer}</div>
                        </div>
                        <div class="answer-item">
                            <div class="rationale-label">Rationale</div>
                            <div class="rationale-text">${q.rationale}</div>
               </div>
                    </div>
                </div>
            `;

            card.addEventListener('click', () => {
                card.classList.toggle('expanded');
                
                // Track reviewed status
                const uniqueKey = `${category}-${q.id}`;
                if (!reviewedQuestions.has(uniqueKey)) {
                    reviewedQuestions.add(uniqueKey);
                    document.getElementById('completedCount').innerText = reviewedQuestions.size;
                }
            });

            return card;
        }

        function updateStats(activeTab) {
            const total = questionDatabase['general-education'].length + questionDatabase['professional-education'].length;
            document.getElementById('totalQuestions').innerText = total;
            document.getElementById('currentTab').innerText = activeTab === 'general-education' ? 'General Ed' : 'Prof Ed';
        }

        // Tab Clicking functionality
        document.querySelectorAll('.tab-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

                button.classList.add('active');
                const tabId = button.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
                
                updateStats(tabId);
            });
        });

        // Initialize App
        document.addEventListener('DOMContentLoaded', renderQuestions);
    </script>
</body>
</html>
