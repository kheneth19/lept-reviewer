<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEPT 2026 Board Exam Reviewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #090d16;
            --card-bg: rgba(17, 25, 40, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-glow: #7c4dff;
            --secondary-glow: #00e5ff;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #00e676;
            --error: #ff1744;
            --accent: #ffb300;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Creative Animated Cosmic Background */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(120px);
            opacity: 0.4;
            animation: floatGlow 12s infinite alternate ease-in-out;
        }

        body::before {
            background: var(--primary-glow);
            top: 10%;
            left: -5%;
        }

        body::after {
            background: var(--secondary-glow);
            bottom: 10%;
            right: -5%;
            animation-delay: 4s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 40px) scale(1.3); }
        }

        .container {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header Design */
        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Futuristic Tab Navigation */
        .tab-container {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            padding: 0.35rem;
            border-radius: 100px;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary-glow), #512da8);
            color: white;
            box-shadow: 0 4px 15px rgba(124, 77, 255, 0.3);
        }

        /* Stats Bar Widget */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            padding: 0.75rem;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--secondary-glow);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.1rem;
        }

        /* Interactive Quiz Card */
        .quiz-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 1.75rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-bottom: 1.5rem;
            position: relative;
        }

        .question-number {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary-glow);
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: block;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        /* Choices List Style */
        .choices-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 1rem 1.25rem;
            border-radius: 14px;
            text-align: left;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
        }

        .choice-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(4px);
        }

        /* Choice Feedback Colors */
        .choice-btn.correct {
            background: rgba(0, 230, 118, 0.15) !important;
            border-color: var(--success) !important;
            color: var(--success);
            font-weight: 600;
        }

        .choice-btn.wrong {
            background: rgba(255, 23, 68, 0.12) !important;
            border-color: var(--error) !important;
            color: var(--error);
        }

        /* Feedback/Rationale Section */
        .feedback-box {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: rgba(255, 179, 0, 0.05);
            border-left: 4px solid var(--accent);
            border-radius: 0 12px 12px 0;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .feedback-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .feedback-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #cbd5e1;
        }

        /* Bottom Controls (Navigation) */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .nav-btn {
            flex: 1;
            padding: 0.9rem;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--secondary-glow);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #00b0ff, #00e5ff);
            color: #000;
            border: none;
            font-weight: 700;
        }

        .nav-btn.primary:hover {
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--card-border);
            margin-top: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🚀 LEPT 2026 Core Reviewer</h1>
            <p>Premium Interactive Board Exam Practice Studio</p>
        </header>

        <div class="tab-container">
            <button class="tab-btn active" data-tab="general-education" onclick="switchTab('general-education')">General Education</button>
            <button class="tab-btn" data-tab="professional-education" onclick="switchTab('professional-education')">Professional Education</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="stat-progress">1 / 5</div>
                <div class="stat-label">Progress</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-score">0</div>
                <div class="stat-label">Score</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-accuracy">0%</div>
                <div class="stat-label">Accuracy</div>
            </div>
        </div>

        <div class="quiz-card">
            <span class="question-number" id="q-number">Question 1</span>
            <div class="question-text" id="q-text">Loading question...</div>
            
            <div class="choices-list" id="choices-container">
                </div>

            <div class="feedback-box" id="feedback-box">
                <div class="feedback-title">💡 System Analysis & Rationale</div>
                <div class="feedback-text" id="feedback-text"></div>
            </div>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" id="prev-btn" onclick="navigateQuestion(-1)">◀ Prev</button>
            <button class="nav-btn primary" id="next-btn" onclick="navigateQuestion(1)">Next ▶</button>
        </div>
    </div>

    <footer>
        <p>⚡ Powered by Premium Glassmorphic Studio Engine • Works Offline</p>
    </footer>

    <script>
        // EXPANDED MULTIPLE-CHOICE QUESTION ENGINE
        const questionDatabase = {
            'general-education': [
                {
                    question: 'Which of the following is the primary purpose of formative assessment?',
                    choices: [
                        'To rank students based on their final term intelligence scores',
                        'To provide feedback during instruction for learning improvement',
                        'To assign final numerical grades at the end of a semester',
                        'To certificate graduation qualification levels'
                    ],
                    correctIndex: 1,
                    rationale: 'Formative assessment occurs DURING the learning process. It acts as a diagnostic system to identify learner struggles in real-time, allowing immediate adjustments before final high-stakes evaluations.'
                },
                {
                    question: 'Bloom\'s Taxonomy was revised in 2001 to replace "Evaluation" with which supreme term?',
                    choices: [
                        'Analyzing data structures',
                        'Applying procedural models',
                        'Evaluating architectural structures',
                        'Create'
                    ],
                    correctIndex: 3,
                    rationale: 'In the 2001 revision by Anderson and Krathwohl, nouns became verbs. "Evaluation" was moved down, and "Creating" (synthesis/production) became the highest cognitive activity.'
                },
                {
                    question: 'In Jean Piaget\'s theory, what is the core cognitive characteristic of the preoperational stage (2-7 years)?',
                    choices: [
                        'Abstract mathematical calculation strategies',
                        'Systematic hypothesis testing logic',
                        'Egocentrism and magical thinking',
                        'Understanding physical reversibility operations'
                    ],
                    correctIndex: 2,
                    rationale: 'Preoperational children struggle to perceive points of view outside their own (egocentrism) and attribute living qualities to inanimate things (magical thinking).'
                },
                {
                    question: 'Which learning theory explicitly emphasizes that human behavior is shaped heavily by consecutive consequences?',
                    choices: [
                        'Operant Conditioning (B.F. Skinner)',
                        'Classical Conditioning (Ivan Pavlov)',
                        'Social Learning Architecture (Albert Bandura)',
                        'Insight Learning Theory (Wolfgang Kohler)'
                    ],
                    correctIndex: 0,
                    rationale: 'B.F. Skinner proved that behavioral patterns undergo adjustments depending on actions/consequences, reinforced via rewards or penalties.'
                },
                {
                    question: 'What does "scaffolding" mean in the context of Vygotsky\'s Zone of Proximal Development (ZPD)?',
                    choices: [
                        'A permanent curriculum matrix framework design',
                        'Temporary support given to a learner to master a task.',
                        'Isolating struggling students into specific remedial groups',
                        'The automated evaluation tool used for grading'
                    ],
                    correctIndex: 1,
                    rationale: 'Scaffolding represents dynamic, adjustable temporary aids deployed by a More Knowledgeable Other (MKO) that systematically fade out as the learner scales autonomy.'
                }
            ],
            'professional-education': [
                {
                    question: 'According to the Code of Ethics for Professional Teachers, what is the teacher’s primary duty to the state?',
                    choices: [
                        'To construct financial infrastructure pipelines for schools',
                        'To secure maximum individual business profits from learning',
                        'To transmit the state’s cultural and national heritage and foster patriotism.',
                        'To change alternative government protocols and political laws'
                    ],
                    correctIndex: 2,
                    rationale: 'As official trustees of public cultural continuation, teachers are fundamentally legally bound to nurture deep national allegiance, identity awareness, and love for country.'
                },
                {
                    question: 'Which curriculum design model focuses heavily on student interests, collaboration, and real-world problem-solving?',
                    choices: [
                        'Subject-Centered Traditional Design',
                        'Learner-Centered Curriculum',
                        'Strict Standardized Text Structure Model',
                        'Rote Memory Automation Design'
                    ],
                    correctIndex: 1,
                    rationale: 'Learner-centered designs pivot purely around individual experiences, traits, capabilities, and intrinsic natural interests of children.'
                }
            ]
        };

        let currentTab = 'general-education';
        let currentIndex = 0;
        let score = 0;
        let answeredQuestions = {}; // Tracks answered questions: { 'tab-index': selectedChoiceIndex }

        function displayQuestion() {
            const currentList = questionDatabase[currentTab];
            const q = currentList[currentIndex];
            
            // Set Headers
            document.getElementById('q-number').innerText = `Question ${currentIndex + 1} of ${currentList.length}`;
            document.getElementById('q-text').innerText = q.question;

            // Generate Interactive Choice Buttons
            const container = document.getElementById('choices-container');
            container.innerHTML = '';
            
            const uniqueKey = `${currentTab}-${currentIndex}`;
            const feedbackBox = document.getElementById('feedback-box');
            
            q.choices.forEach((choice, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = choice;
                
                // Click functionality
                btn.onclick = () => selectChoice(idx);
                container.appendChild(btn);
            });

            // If question was already answered previously, restore states
            if (uniqueKey in answeredQuestions) {
                const previousSelection = answeredQuestions[uniqueKey];
                revealAnswers(previousSelection);
            } else {
                feedbackBox.style.display = 'none';
                document.getElementById('next-btn').disabled = true; // Force selection first
            }

            updateDashboard();
        }

        function selectChoice(selectedIndex) {
            const uniqueKey = `${currentTab}-${currentIndex}`;
            const q = questionDatabase[currentTab][currentIndex];

            // Lock response
            answeredQuestions[uniqueKey] = selectedIndex;

            // Score tallying
            if (selectedIndex === q.correctIndex) {
                score++;
            }

            revealAnswers(selectedIndex);
            updateDashboard();
        }

        function revealAnswers(selectedIndex) {
            const q = questionDatabase[currentTab][currentIndex];
            const buttons = document.querySelectorAll('.choice-btn');
            const feedbackBox = document.getElementById('feedback-box');
            const feedbackText = document.getElementById('feedback-text');

            buttons.forEach((btn, idx) => {
                btn.disabled = true; // Turn off clicks after answering
                if (idx === q.correctIndex) {
                    btn.classList.add('correct'); // Highlight answer target
                } else if (idx === selectedIndex) {
                    btn.classList.add('wrong'); // Misstep highlight
                }
            });

            // Reveal explanation module
            feedbackText.innerText = q.rationale;
            feedbackBox.style.display = 'block';
            document.getElementById('next-btn').disabled = false;
        }

        function navigateQuestion(direction) {
            const currentList = questionDatabase[currentTab];
            currentIndex += direction;

            if (currentIndex >= currentList.length) {
                currentIndex = currentList.length - 1;
                alert('🎉 Mahusay! Natapos mo na ang lahat ng mga katanungan sa section na ito.');
                return;
            }
            if (currentIndex < 0) currentIndex = 0;

            displayQuestion();
        }

            cu
