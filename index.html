<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEPT 2026 Board Exam Reviewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --tertiary-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --accent-color: #00f2fe;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --dark-bg: #0f172a;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --border-radius: 1rem;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            line-height: 1.6;
            background-attachment: fixed;
            background-image: 
                radial-gradient(at 20% 50%, rgba(102, 126, 234, 0.1) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(245, 93, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 40% 20%, rgba(79, 172, 254, 0.1) 0px, transparent 50%);
            background-color: var(--dark-bg);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-md);
        }

        /* Header & Title */
        header {
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-md);
            margin-bottom: var(--spacing-xl);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-sm);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Tab Navigation */
        .tab-container {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: var(--spacing-sm);
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .tab-btn {
            flex: 1;
            min-width: 150px;
            padding: var(--spacing-md) var(--spacing-lg);
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--secondary-gradient);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .tab-btn:hover {
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 93, 248, 0.2);
        }

        .tab-btn:hover::before {
            left: 0;
        }

        .tab-btn.active {
            background: var(--secondary-gradient);
            color: var(--text-primary);
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(245, 93, 248, 0.3);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        /* Questions Grid */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        /* Question Card (Accordion) */
        .question-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            animation: cardSlide 0.6s ease-out backwards;
        }

        @keyframes cardSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-card:nth-child(1) { animation-delay: 0.1s; }
        .question-card:nth-child(2) { animation-delay: 0.2s; }
        .question-card:nth-child(3) { animation-delay: 0.3s; }
        .question-card:nth-child(4) { animation-delay: 0.4s; }
        .question-card:nth-child(5) { animation-delay: 0.5s; }
        .question-card:nth-child(6) { animation-delay: 0.6s; }
        .question-card:nth-child(n+7) { animation-delay: 0.7s; }

        .question-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: var(--card-shadow);
        }

        .question-header {
            padding: var(--spacing-md);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--spacing-md);
        }

        .question-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: var(--tertiary-gradient);
            border-radius: 50%;
            flex-shrink: 0;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .question-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 500;
        }

        .expand-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-card.expanded .expand-icon {
            transform: rotate(180deg);
            color: var(--accent-color);
        }

        /* Answer Section */
        .answer-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 242, 254, 0.05);
            border-top: 1px solid var(--glass-border);
        }

        .question-card.expanded .answer-section {
            max-height: 1000px;
        }

        .answer-content {
            padding: var(--spacing-md);
        }

        .answer-item {
            margin-bottom: var(--spacing-md);
        }

        .answer-item:last-child {
            margin-bottom: 0;
        }

        .answer-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .answer-label::before {
            content: '✓';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: var(--success-color);
            border-radius: 50%;
            font-size: 0.75rem;
            color: var(--text-primary);
        }

        .answer-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            padding: var(--spacing-sm);
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--accent-color);
            border-radius: 0.5rem;
        }

        .rationale-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--warning-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: var(--spacing-xs);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            margin-top: var(--spacing-md);
        }

        .rationale-label::before {
            content: '💡';
            display: inline-flex;
            font-size: 1rem;
        }

        .rationale-text {
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text-secondary);
            padding: var(--spacing-sm);
            background: rgba(245, 158, 11, 0.05);
            border-left: 3px solid var(--warning-color);
            border-radius: 0.5rem;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            margin-bottom: var(--spacing-lg);
            justify-content: center;
        }

        .stat-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 0.8rem;
            padding: var(--spacing-md) var(--spacing-lg);
            min-width: 150px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-xs);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: var(--spacing-lg) var(--spacing-md);
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: var(--spacing-xl);
            border-top: 1px solid var(--glass-border);
        }

        .footer-gradient {
            background: var(--tertiary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: var(--spacing-sm);
            }

            header {
                padding: var(--spacing-lg) var(--spacing-md);
                margin-bottom: var(--spacing-lg);
            }

            h1 {
                font-size: 1.8rem;
            }

            .tab-container {
                flex-direction: column;
                gap: var(--spacing-sm);
            }

            .tab-btn {
                min-width: 100%;
                padding: var(--spacing-md);
            }

            .questions-grid {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }

            .question-header {
                padding: var(--spacing-md);
            }

            .question-text {
                font-size: 0.9rem;
            }

            .stats-bar {
                gap: var(--spacing-sm);
            }

            .stat-item {
                flex: 1;
                min-width: 120px;
                padding: var(--spacing-md);
            }

            .stat-value {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            :root {
                --spacing-md: 1rem;
                --spacing-lg: 1.5rem;
            }

            .container {
                padding: var(--spacing-sm);
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .question-card {
                margin: 0;
            }

            .question-header {
                gap: var(--spacing-sm);
            }

            .question-number {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }

            .question-text {
                font-size: 0.85rem;
            }

            .answer-text {
                font-size: 0.9rem;
                padding: var(--spacing-sm);
            }

            .stat-item {
                padding: var(--spacing-md) var(--spacing-sm);
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--secondary-gradient);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-gradient);
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                color: black;
            }

            .tab-container {
                display: none;
            }

            .question-card.expanded .answer-section {
                max-height: none;
            }

            .question-card {
                page-break-inside: avoid;
            }
        }

        /* Loading Animation */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .loading {
            animation: pulse 2s infinite;
        }
    </style>
</head>
